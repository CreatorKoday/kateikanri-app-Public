<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KURA:S">
<meta name="theme-color" content="#7B5CFF">
<title>KURA:S ― 暮らしを、もっとスマートに。</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrap">
  <div class="brand-header">
    <p class="brand-logo">KURA:S</p>
    <p class="brand-tagline">暮らしを、もっとスマートに。</p>
  </div>

  <div id="auth-card" class="card">
    <label for="email">メールアドレス</label>
    <div class="input-icon-wrap">
      <i data-lucide="mail"></i>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <label for="password">パスワード(6文字以上)</label>
    <div class="input-icon-wrap">
      <i data-lucide="lock"></i>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="login-btn"><i data-lucide="log-in"></i> ログイン</button>
    <button class="btn-secondary" id="signup-btn"><i data-lucide="user-plus"></i> はじめて使う方はこちら</button>

    <div id="message"></div>
  </div>

  <div id="logged-in-area" class="hidden">

    <div class="top-bar">
      <span>ログイン中: <strong id="user-email"></strong></span>
      <button id="logout-btn">ログアウト</button>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" data-view="home"><i data-lucide="home"></i> ホーム</button>
      <button class="nav-btn" data-view="shopping"><i data-lucide="shopping-cart"></i> 買い物</button>
      <button class="nav-btn" data-view="inventory"><i data-lucide="package"></i> 在庫</button>
    </div>

    <div id="view-home" class="view">

      <!-- アクションメニュー: 1タップでそれぞれの機能を開く -->
      <div class="action-menu-grid">
        <button class="action-menu-card register" data-target="barcode">
          <span class="action-menu-icon"><i data-lucide="scan-line"></i></span>
          <span class="action-menu-label">バーコード登録</span>
        </button>
        <button class="action-menu-card consume" data-target="consume-barcode">
          <span class="action-menu-icon"><i data-lucide="scan-line"></i></span>
          <span class="action-menu-label">バーコード削除</span>
        </button>
        <button class="action-menu-card register" data-target="ai">
          <span class="action-menu-icon"><i data-lucide="camera"></i></span>
          <span class="action-menu-label">AI登録</span>
        </button>
        <button class="action-menu-card consume" data-target="consume-ai">
          <span class="action-menu-icon"><i data-lucide="camera"></i></span>
          <span class="action-menu-label">AI削除</span>
        </button>
        <button class="action-menu-card register" data-target="manual">
          <span class="action-menu-icon"><i data-lucide="edit-3"></i></span>
          <span class="action-menu-label">手動登録</span>
        </button>
        <button class="action-menu-card consume" data-target="consume-manual">
          <span class="action-menu-icon"><i data-lucide="trash-2"></i></span>
          <span class="action-menu-label">手動削除</span>
        </button>
      </div>

      <!-- 今後、賞味期限が近い食材・期限切れ・おすすめレシピ・在庫サマリーなどをここに追加予定 -->

      <div id="add-message" style="margin:10px 0;"></div>

      <!-- 選択した機能がここに直接開く(モード選択・タブ選択なし) -->
      <div id="action-panel-section" class="card hidden" style="margin-top:16px;">
        <div class="accordion-panel-header">
          <h2 id="action-panel-title" style="margin:0;"></h2>
          <button class="modal-close-btn" id="close-action-panel-btn"><i data-lucide="x"></i></button>
        </div>

        <div class="tab-panel" id="tab-panel-barcode">
          <div id="scanner-wrap" class="hidden">
            <div id="reader"></div>
            <p class="scan-hint">バーコード全体が枠に収まる距離(10〜15cmくらい)で、明るい場所で数秒待ってください</p>
            <button class="btn-secondary" id="close-scanner-btn"><i data-lucide="x"></i> キャンセル</button>
          </div>
          <button class="btn-primary" id="scan-btn"><i data-lucide="scan-line"></i> スキャンを開始する</button>
        </div>

        <div class="tab-panel" id="tab-panel-ai">
          <input type="file" accept="image/*" capture="environment" id="photo-input" class="hidden">
          <button class="btn-primary" id="photo-btn"><i data-lucide="camera"></i> 写真を撮影する</button>

          <div id="review-section" class="hidden" style="margin-top:16px;">
            <span class="review-badge">AI判定結果</span>
            <h2 style="margin-top:0;">写真から見つかった商品</h2>
            <p class="review-note">内容を確認・修正してから登録してください。同じ名前の商品がすでにあれば、数量がまとめて加算されます。</p>
            <div id="review-list"></div>
            <button class="btn-primary" id="register-all-btn"><i data-lucide="check-check"></i> まとめて登録する</button>
            <button class="btn-secondary" id="cancel-review-btn"><i data-lucide="x"></i> キャンセル</button>
            <div id="review-message"></div>
          </div>
        </div>

        <div class="tab-panel" id="tab-panel-manual">
          <label for="item-name">商品名</label>
          <input type="text" id="item-name" placeholder="例: 牛乳">

          <div class="row2">
            <div>
              <label for="item-category">分類</label>
              <select id="item-category">
                <option value="食材">食材</option>
                <option value="日用品">日用品</option>
              </select>
            </div>
            <div>
              <label for="item-unit">単位</label>
              <input type="text" id="item-unit" placeholder="個・本など" value="個">
              <div id="item-unit-suggestions" class="unit-chip-row"></div>
            </div>
          </div>

          <div class="row2">
            <div>
              <label for="item-quantity">数量</label>
              <select id="item-quantity"></select>
              <input type="number" id="item-quantity-numeric" class="hidden" min="0" step="any" inputmode="decimal" placeholder="例: 500">
            </div>
            <div>
              <label for="item-expiry">消費・賞味期限(任意)</label>
              <input type="text" id="item-expiry" class="date-display" placeholder="タップして選択" readonly>
            </div>
          </div>

          <button class="btn-primary" id="add-item-btn"><i data-lucide="plus"></i> 登録する</button>
          <div id="manual-add-message"></div>
        </div>

        <div class="tab-panel" id="tab-panel-consume-barcode">
          <div id="consume-scanner-wrap" class="hidden">
            <div id="consume-reader"></div>
            <p class="scan-hint">バーコード全体が枠に収まる距離(10〜15cmくらい)で、明るい場所で数秒待ってください</p>
            <button class="btn-secondary" id="close-consume-scanner-btn"><i data-lucide="x"></i> キャンセル</button>
          </div>
          <button class="btn-primary" id="consume-scan-btn"><i data-lucide="scan-line"></i> スキャンを開始する</button>
        </div>

        <div class="tab-panel" id="tab-panel-consume-ai">
          <input type="file" accept="image/*" capture="environment" id="consume-photo-input" class="hidden">
          <button class="btn-primary" id="consume-photo-btn"><i data-lucide="camera"></i> 写真を撮影する</button>
        </div>

        <div class="tab-panel" id="tab-panel-consume-manual">
          <label for="consume-search">商品を検索</label>
          <input type="text" id="consume-search" placeholder="商品名で検索(例: 牛乳)">
          <div id="consume-search-results"></div>

          <div id="manual-consume-review-section" class="hidden" style="margin-top:16px;">
            <h2 style="margin-top:0;">消費する商品</h2>
            <div id="manual-consume-review-list"></div>
            <button class="btn-primary" id="manual-confirm-consume-btn"><i data-lucide="check-check"></i> 消費する</button>
            <div id="manual-consume-message"></div>
          </div>
        </div>

        <!-- バーコード/AIどちらの消費結果もここに共通表示 -->
        <div id="consume-review-section" class="hidden" style="margin-top:16px;">
          <span class="review-badge" style="background:#FEE2E2; color:#B91C1C;">消費登録</span>
          <h2 style="margin-top:0;">在庫から消費する商品</h2>
          <p class="review-note">数量を確認し、必要であれば調整してから確定してください。「すべて消費」で在庫を0にできます。</p>
          <div id="consume-review-list"></div>
          <button class="btn-primary" id="confirm-consume-btn"><i data-lucide="check-check"></i> 消費する</button>
          <button class="btn-secondary" id="cancel-consume-btn"><i data-lucide="x"></i> キャンセル</button>
        </div>

        <div id="consume-message" style="margin-top:12px;"></div>
      </div>
    </div>

    <div id="view-shopping" class="view hidden">

      <h2 style="margin-top:0;">買い物リスト</h2>
      <div class="card">
        <label for="shopping-name">買いたいもの(在庫にないものもOK)</label>
        <input type="text" id="shopping-name" placeholder="例: 来客用のお菓子">
        <div class="row2">
          <div>
            <label for="shopping-quantity">数量</label>
            <select id="shopping-quantity"></select>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button class="btn-primary" id="add-shopping-btn" style="margin-top:12px;"><i data-lucide="plus"></i> 追加</button>
          </div>
        </div>
        <div id="shopping-message"></div>
      </div>
      <div id="shopping-list"></div>
    </div>

    <div id="view-inventory" class="view hidden">
      <h2 style="margin-top:0;">在庫確認</h2>
      <div class="filter-row">
        <select id="filter-category">
          <option value="">すべての分類</option>
          <option value="食材">食材</option>
          <option value="日用品">日用品</option>
        </select>
        <select id="filter-tag">
          <option value="">すべてのタグ</option>
        </select>
      </div>
      <div id="item-list"></div>
    </div>

  </div>
</div>

<!-- 日付選択用の自作カレンダー -->
<div id="calendar-overlay" class="hidden">
  <div id="calendar-modal">
    <div class="calendar-header">
      <button type="button" id="cal-prev"><i data-lucide="chevron-left"></i></button>
      <span id="cal-month-label"></span>
      <button type="button" id="cal-next"><i data-lucide="chevron-right"></i></button>
    </div>
    <div id="yearmonth-picker" class="yearmonth-picker hidden">
      <select id="cal-year-select"></select>
      <select id="cal-month-select"></select>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
    <div class="calendar-footer">
      <button type="button" class="btn-secondary" id="cal-clear">未設定にする</button>
      <button type="button" class="btn-secondary" id="cal-close">閉じる</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
