<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KURA:S">
<meta name="theme-color" content="#7B5CFF">
<title>KURA:S ― 暮らしを、もっとスマートに。</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #7B5CFF;
    --secondary: #9F84FF;
    --accent: #C9B5FF;
    --accent-tint: #F1EDFF;
    --bg: #F6F7FB;
    --card: #FFFFFF;
    --text: #191919;
    --text-muted: #6B7280;
    --border: #E8EAF0;
    --success: #22C55E;
    --warning: #F59E0B;
    --danger: #EF4444;
  }

  html { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  html, body {
    height: 100%;
    overflow: hidden; /* 画面全体としてはスクロールさせない */
    overscroll-behavior: none;
    touch-action: pan-y; /* ピンチズーム・横スワイプのズームを抑止 */
  }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 18px 18px 60px;
    height: 100%;
    height: 100dvh;
    overflow-y: auto;   /* 中身が画面に収まらない時だけ縦スクロール */
    overflow-x: hidden; /* 横スクロールは常に禁止 */
    -webkit-overflow-scrolling: touch;
  }

  .lucide { width: 18px; height: 18px; stroke-width: 2; vertical-align: middle; }

  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .brand-header { text-align: center; margin-bottom: 14px; animation: fadeSlideIn .5s ease; }
  .brand-logo {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 0.28em;
    margin: 0;
    padding-left: 0.28em; /* letter-spacingで右にずれる分を中央合わせで補正 */
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brand-tagline {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    margin: 6px 0 0;
  }

  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 21px;
    color: var(--text);
    margin: 30px 4px 14px;
  }
  h3.group-heading {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    margin: 26px 2px 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  h4.group-subheading {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 16px 4px 8px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 24px 20px;
    box-shadow: 0 2px 6px rgba(25,17,66,0.04), 0 12px 28px rgba(25,17,66,0.05);
    animation: fadeSlideIn .35s ease;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 16px 0 6px;
    font-weight: 600;
  }
  input, select {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: var(--card);
    color: var(--text);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(123,92,255,0.14);
  }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; min-width: 0; }
  input[type="date"] { min-width: 0; padding-right: 6px; }
  input[type="date"]::-webkit-date-and-time-value { text-align: left; min-height: 1.2em; }

  .input-icon-wrap { position: relative; }
  .input-icon-wrap .lucide {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .input-icon-wrap input { padding-left: 42px; }

  button {
    border: none;
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease, color .2s ease;
  }
  button:active { transform: scale(0.96); }

  .btn-primary {
    width: 100%; height: 50px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    margin-top: 18px; font-size: 15px;
    box-shadow: 0 6px 16px rgba(123,92,255,0.32);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(123,92,255,0.4); }
  .btn-secondary {
    width: 100%; height: 48px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #fff; color: var(--text);
    border: 1px solid var(--border);
    margin-top: 12px; font-size: 14px;
  }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-logout {
    width: 100%; height: 44px;
    background: transparent; color: var(--danger);
    margin-top: 16px; font-size: 13px;
  }
  #message { text-align: center; font-size: 13px; margin-top: 14px; min-height: 18px; }
  .msg-error { color: var(--danger); }
  .msg-ok { color: var(--success); }
  .hidden { display: none; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-muted); margin-bottom: 18px;
  }
  .top-bar strong { color: var(--text); font-weight: 600; }
  .top-bar button {
    background: none; color: var(--danger); font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; padding: 4px 8px; height: auto;
  }

  .nav-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    max-width: 460px;
    display: flex; gap: 4px;
    background: #fff; border: 1px solid var(--border); border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 10px 10px calc(22px + env(safe-area-inset-bottom));
    box-shadow: 0 -6px 20px rgba(25,17,66,0.08);
    z-index: 900;
  }
  .nav-btn {
    flex: 1; height: 46px; padding: 0 4px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: transparent; color: var(--text-muted);
    font-size: 11px; letter-spacing: 0.02em; border-radius: 999px;
  }
  .nav-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    box-shadow: 0 4px 12px rgba(123,92,255,0.35);
  }

  #logged-in-area { padding-bottom: 100px; }

  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  .action-card {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    padding: 22px 10px; background: #fff; border: 1px solid var(--border); border-radius: 20px;
    color: var(--text); font-size: 13px; font-weight: 600; height: auto;
  }
  .action-card .lucide { width: 26px; height: 26px; color: var(--primary); }
  .action-card:hover { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(123,92,255,0.16); border-color: var(--primary); }

  #scanner-wrap { margin-top: 14px; }
  #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
  .scan-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin: 10px 0 0; }

  /* --- 在庫カード --- */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(25,17,66,0.03);
    border-left: 4px solid var(--primary);
    animation: fadeSlideIn .3s ease;
  }
  .item-card.expired { border-left-color: var(--danger); }
  .item-card.soon { border-left-color: var(--warning); }
  .item-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .item-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text); }
  .item-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .tag {
    display: inline-block; background: var(--accent-tint); color: var(--primary);
    border-radius: 999px; padding: 4px 10px; font-size: 10px;
    letter-spacing: 0.04em; white-space: nowrap; font-weight: 600;
  }
  .tag.warning { background: #FEF3C7; color: #B45309; }

  .item-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .stat { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .stat-label { font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--text); }
  .stat-value.text-danger { color: var(--danger); }
  .stat-value.text-warning { color: var(--warning); }
  .threshold-input {
    width: 52px; height: 28px; padding: 0 6px; font-size: 13px; border-radius: 8px;
  }

  .item-card-footer { display: flex; align-items: center; justify-content: space-between; }
  .qty-control { display: flex; align-items: center; gap: 10px; }
  .qty-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border); color: var(--primary);
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .qty-btn:hover { background: var(--accent-tint); border-color: var(--primary); }
  .qty-btn .lucide { width: 15px; height: 15px; }
  .qty-num { min-width: 30px; text-align: center; font-size: 15px; font-weight: 700; color: var(--text); }
  .del-btn {
    display: flex; align-items: center; gap: 4px;
    background: none; color: var(--text-muted); font-size: 12px; font-weight: 600;
    padding: 4px 6px; height: auto;
  }
  .del-btn .lucide { width: 15px; height: 15px; }
  .del-btn:hover { color: var(--danger); }
  .empty-note {
    text-align: center; color: var(--text-muted); font-size: 13px; padding: 34px 20px;
    border: 1px dashed var(--border); border-radius: 20px; background: #fff;
  }

  /* --- 写真AI判定レビューカード --- */
  .review-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 18px 20px; margin-bottom: 12px; position: relative;
    animation: fadeSlideIn .3s ease;
  }
  .review-card .del-btn {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 50%; background: var(--bg); padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .review-note { font-size: 12px; color: var(--text-muted); margin: 6px 0 0; }
  .review-badge {
    display: inline-block; background: var(--accent-tint); color: var(--primary);
    border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; margin-bottom: 8px;
  }

  /* --- 買い物リスト --- */
  .shopping-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 14px 18px; margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(25,17,66,0.03);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border-left: 4px solid var(--success);
    animation: fadeSlideIn .3s ease;
  }
  .shopping-card.manual { border-left-color: var(--border); }
  .shopping-info { flex: 1; min-width: 0; }
  .shopping-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--text); }
  .shopping-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .check-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none; color: #fff; padding: 0; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(123,92,255,0.3);
  }
  .check-btn:hover { transform: translateY(-1px) scale(1.04); }
  .check-btn .lucide { width: 17px; height: 17px; }

  .unit-chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .unit-chip {
    height: auto; padding: 5px 12px;
    background: var(--accent-tint); color: var(--primary);
    border: 1px solid transparent; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }
  .unit-chip:hover { border-color: var(--primary); }
  .unit-chip.selected { background: var(--primary); color: #fff; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }

  /* --- 自作カレンダー(日付選択) --- */
  .date-display { cursor: pointer; background: var(--card); }
  #calendar-overlay {
    position: fixed; inset: 0; background: rgba(25,17,40,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
    animation: fadeIn .2s ease;
  }
  #calendar-overlay.hidden { display: none; }
  #calendar-modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 22px;
    width: 100%; max-width: 340px;
    box-shadow: 0 20px 50px rgba(25,17,66,0.2);
    animation: fadeSlideIn .25s ease;
  }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .calendar-header button {
    background: var(--bg); border: 1px solid var(--border); color: var(--primary); width: 34px; height: 34px;
    border-radius: 50%; padding: 0; margin-top: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .calendar-header button:hover { background: var(--accent-tint); border-color: var(--primary); }
  #cal-month-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 17px; letter-spacing: 0.01em; color: var(--text);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--primary);
    text-underline-offset: 4px;
  }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .calendar-grid .cal-dow { text-align: center; font-size: 10px; letter-spacing: 0.04em; color: var(--text-muted); padding: 4px 0; }
  .calendar-grid .cal-day {
    text-align: center; padding: 9px 0; border-radius: 10px; font-size: 13px;
    cursor: pointer; background: transparent; color: var(--text);
    transition: background .15s ease;
  }
  .calendar-grid .cal-day.empty { background: none; cursor: default; }
  .calendar-grid .cal-day:not(.empty):hover { background: var(--accent-tint); }
  .calendar-grid .cal-day.selected { background: var(--primary); color: #fff; font-weight: 700; }
  .calendar-grid .cal-day.today { background: var(--accent-tint); color: var(--primary); font-weight: 700; border: 1px solid var(--primary); }
  .calendar-grid .cal-day.today.selected { color: #fff; background: var(--primary); border-color: var(--primary); }
  .yearmonth-picker { display: flex; gap: 8px; margin-bottom: 12px; }
  .yearmonth-picker select { height: 44px; }
  .calendar-footer { display: flex; gap: 8px; margin-top: 16px; }
  .calendar-footer button { margin-top: 0; flex: 1; height: 44px; }
  #calendar-grid.hidden, #yearmonth-picker.hidden { display: none; }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand-header">
    <p class="brand-logo">KURA:S</p>
    <p class="brand-tagline">暮らしを、もっとスマートに。</p>
  </div>

  <div id="auth-card" class="card">
    <label for="email">メールアドレス</label>
    <div class="input-icon-wrap">
      <i data-lucide="mail"></i>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <label for="password">パスワード(6文字以上)</label>
    <div class="input-icon-wrap">
      <i data-lucide="lock"></i>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="login-btn"><i data-lucide="log-in"></i> ログイン</button>
    <button class="btn-secondary" id="signup-btn"><i data-lucide="user-plus"></i> はじめて使う方はこちら</button>

    <div id="message"></div>
  </div>

  <div id="logged-in-area" class="hidden">

    <div class="top-bar">
      <span>ログイン中: <strong id="user-email"></strong></span>
      <button id="logout-btn">ログアウト</button>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" data-view="home"><i data-lucide="home"></i> ホーム</button>
      <button class="nav-btn" data-view="shopping"><i data-lucide="shopping-cart"></i> 買い物</button>
      <button class="nav-btn" data-view="inventory"><i data-lucide="package"></i> 在庫</button>
    </div>

    <div id="view-home" class="view">
      <div class="card">
        <div class="action-grid">
          <button class="action-card" id="scan-btn"><i data-lucide="scan-line"></i><span>バーコード</span></button>
          <button class="action-card" id="photo-btn"><i data-lucide="camera"></i><span>写真でAI判定</span></button>
        </div>
        <input type="file" accept="image/*" capture="environment" id="photo-input" class="hidden">

        <div id="scanner-wrap" class="hidden">
          <div id="reader"></div>
          <p class="scan-hint">バーコード全体が枠に収まる距離(10〜15cmくらい)で、明るい場所で数秒待ってください</p>
          <button class="btn-secondary" id="close-scanner-btn"><i data-lucide="x"></i> キャンセル</button>
        </div>

        <label for="item-name">商品名</label>
        <input type="text" id="item-name" placeholder="例: 牛乳">

        <div class="row2">
          <div>
            <label for="item-category">分類</label>
            <select id="item-category">
              <option value="食材">食材</option>
              <option value="日用品">日用品</option>
            </select>
          </div>
          <div>
            <label for="item-unit">単位</label>
            <input type="text" id="item-unit" placeholder="個・本など" value="個">
            <div id="item-unit-suggestions" class="unit-chip-row"></div>
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="item-quantity">数量</label>
            <select id="item-quantity"></select>
          </div>
          <div>
            <label for="item-expiry">消費・賞味期限(任意)</label>
            <input type="text" id="item-expiry" class="date-display" placeholder="タップして選択" readonly>
          </div>
        </div>

        <button class="btn-primary" id="add-item-btn"><i data-lucide="plus"></i> 登録する</button>
        <div id="add-message"></div>
      </div>

      <div id="review-section" class="card hidden">
        <span class="review-badge">AI判定結果</span>
        <h2 style="margin-top:0;">写真から見つかった商品</h2>
        <p class="review-note">内容を確認・修正してから登録してください。同じ名前の商品がすでにあれば、数量がまとめて加算されます。</p>
        <div id="review-list"></div>
        <button class="btn-primary" id="register-all-btn"><i data-lucide="check-check"></i> まとめて登録する</button>
        <button class="btn-secondary" id="cancel-review-btn"><i data-lucide="x"></i> キャンセル</button>
        <div id="review-message"></div>
      </div>
    </div>

    <div id="view-shopping" class="view hidden">
      <h2 style="margin-top:0;">買い物リスト</h2>
      <div class="card">
        <label for="shopping-name">買いたいもの(在庫にないものもOK)</label>
        <input type="text" id="shopping-name" placeholder="例: 来客用のお菓子">
        <div class="row2">
          <div>
            <label for="shopping-quantity">数量</label>
            <select id="shopping-quantity"></select>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button class="btn-primary" id="add-shopping-btn" style="margin-top:12px;"><i data-lucide="plus"></i> 追加</button>

  function updateUnitSuggestions() {

  async function upsertItemByName({ name, category, unit, quantity, expiry_date, low_stock_threshold, barcode }) {
    const cleanName = (name || "").trim();
    if (!cleanName) return null;

    const { data: existingList, error: findError } = await supabaseClient
      .from("items")
      .select("id, quantity, expiry_date, low_stock_threshold")
      .eq("name", cleanName)
      .limit(1);

    if (findError) console.error("既存商品の検索に失敗:", findError);

    const existing = existingList && existingList.length > 0 ? existingList[0] : null;

    if (existing) {
      const newQuantity = Number(existing.quantity) + Number(quantity || 0);
      const updatePayload = { quantity: newQuantity, updated_at: new Date().toISOString() };
      if (!existing.expiry_date && expiry_date) updatePayload.expiry_date = expiry_date;
      if (low_stock_threshold !== undefined && low_stock_threshold !== null) {
        updatePayload.low_stock_threshold = Number(low_stock_threshold);
      }
      const { error: updateError } = await supabaseClient.from("items").update(updatePayload).eq("id", existing.id);
      if (updateError) { console.error("商品の更新に失敗:", updateError); return null; }
      await syncShoppingListForItem(existing.id);
      return existing.id;
    } else {
      const { data: inserted, error: insertError } = await supabaseClient
        .from("items")
        .insert({
          name: cleanName,
          category,
          unit,
          quantity: Number(quantity || 0),
          expiry_date: expiry_date || null,
          low_stock_threshold: Number(low_stock_threshold || 1),
          barcode: barcode || null,
          tag: guessTag(cleanName)
        })
        .select()
        .single();
      if (insertError) { console.error("商品の登録に失敗:", insertError); return null; }
      await syncShoppingListForItem(inserted.id);
      return inserted.id;
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function identifyProductsWithAI(base64Data, mimeType) {
    const prompt = "この写真に写っている食品・日用品をすべて識別してください。" +
      "商品名(name)は、ブランド名や「おいしい」「厳選」などの宣伝文句を除いた、一般的な呼び方にしてください(例:「おいしい牛乳」ではなく「牛乳」、「〇〇農園のキャベツ」ではなく「キャベツ」)。" +
      "同じ種類の商品が複数写っている場合は1つの項目にまとめて、その個数をquantityに入れてください。" +
      "違う商品ごとに別の項目として出力してください。" +
      "categoryは「食材」か「日用品」のどちらか一方にしてください。" +
      "unitには個・本・パック・袋・箱など、その商品に自然な単位を日本語で入れてください。" +
      "商品が何も認識できない場合は空の配列を返してください。";

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-goog-api-key": GEMINI_API_KEY
        },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: mimeType, data: base64Data } }
            ]
          }],
          generationConfig: {
            temperature: 0,
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  name: { type: "STRING" },
                  category: { type: "STRING", enum: ["食材", "日用品"] },
                  unit: { type: "STRING" },
                  quantity: { type: "NUMBER" }
                },
                required: ["name", "category", "unit", "quantity"]
              }
            }
          }
        })
      }
    );

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "AIとの通信に失敗しました");
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return [];

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("AIの応答を解析できませんでした");
    }
  }

  function renderReviewList(items) {

            </select>
          </div>
          <div>
            <label>単位</label>
            <input type="text" class="review-unit" value="${escapeHtml(item.unit || "個")}">
          </div>
        </div>

        <div class="row2">
          <div>
            <label>数量</label>
            <select class="review-quantity">${buildQuantityOptionsHtml(item.quantity || 1)}</select>
          </div>
          <div>

            <input type="text" class="review-expiry date-display" placeholder="タップして選択" readonly>
          </div>
        </div>
      </div>
    `).join("");

    if (window.lucide) lucide.createIcons();

    reviewList.querySelectorAll(".review-remove-btn").forEach(btn => {

  document.getElementById("register-all-btn").addEventListener("click", async () => {
    const cards = document.querySelectorAll("#review-list .review-card");
    if (cards.length === 0) {
      showMessage(reviewMessageBox, "登録する商品がありません", true);
      return;
    }

    let count = 0;
    for (const card of cards) {
      const name = card.querySelector(".review-name").value.trim();
      if (!name) continue;
      await upsertItemByName({
        name,
        category: card.querySelector(".review-category").value,
        unit: card.querySelector(".review-unit").value.trim() || "個",
        quantity: parseFloat(card.querySelector(".review-quantity").value) || 0,
        expiry_date: card.querySelector(".review-expiry").value || null
      });
      count++;
    }

    if (count === 0) {
      showMessage(reviewMessageBox, "商品名が入力されていません", true);
      return;
    }

    document.getElementById("review-section").classList.add("hidden");
    document.getElementById("review-list").innerHTML = "";
    showMessage(addMessageBox, count + "件登録しました", false);
  });

  async function loadItems() {
    let query = supabaseClient
      .from("items")
      .select("*")
      .order("expiry_date", { ascending: true, nullsFirst: false })
      .order("name", { ascending: true });

    const catFilter = document.getElementById("filter-category").value;
    const tagFilter = document.getElementById("filter-tag").value;
    if (catFilter) query = query.eq("category", catFilter);
    if (tagFilter) query = query.eq("tag", tagFilter);

    const { data, error } = await query;

    if (error) {
      itemListEl.innerHTML = '<div class="empty-note">読み込みエラー: ' + error.message + '</div>';
      return;
    }
    renderItems(data);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date();
    today.setHours(0,0,0,0);
    const target = new Date(dateStr + "T00:00:00");
    return Math.round((target - today) / (1000 * 60 * 60 * 24));
  }

  function renderItems(items) {
    if (!items || items.length === 0) {
      itemListEl.innerHTML = '<div class="empty-note">該当する商品がありません。</div>';
      return;
    }

    const groups = {};
    items.forEach(item => {
      const cat = item.category || "その他";
      const tag = item.tag || "その他";
      groups[cat] = groups[cat] || {};
      groups[cat][tag] = groups[cat][tag] || [];
      groups[cat][tag].push(item);
    });

    let html = "";
    Object.keys(groups).sort().forEach(cat => {
      html += `<h3 class="group-heading">${escapeHtml(cat)}</h3>`;
      Object.keys(groups[cat]).sort().forEach(tag => {
        html += `<h4 class="group-subheading">${escapeHtml(tag)}</h4>`;
        groups[cat][tag].forEach(item => { html += itemCardHtml(item); });
      });
    });
    itemListEl.innerHTML = html;
    if (window.lucide) lucide.createIcons();
  }

  function itemCardHtml(item) {
    const d = daysUntil(item.expiry_date);
    let statusClass = "";
    let expiryText = "未設定";
    if (d !== null) {
      if (d < 0) {
        statusClass = "expired";
        expiryText = "期限切れ";
      } else if (d <= 3) {
        statusClass = "soon";
        expiryText = "あと" + d + "日";
      } else {
        expiryText = "あと" + d + "日";
      }
    }
    const lowStock = Number(item.quantity) <= Number(item.low_stock_threshold);

    return `
      <div class="item-card ${statusClass}">
        <div class="item-card-header">
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-badges">
            <span class="tag">${escapeHtml(item.tag || item.category)}</span>
            ${lowStock ? '<span class="tag warning">在庫少なめ</span>' : ""}
          </div>
        </div>
        <div class="item-stats">
          <div class="stat">
            <span class="stat-label">在庫</span>
            <span class="stat-value">${item.quantity}${escapeHtml(item.unit)}</span>
          </div>
          <div class="stat">
            <span class="stat-label">賞味期限</span>
            <span class="stat-value ${statusClass === "expired" ? "text-danger" : statusClass === "soon" ? "text-warning" : ""}">${expiryText}</span>
          </div>
          <div class="stat">
            <span class="stat-label">最低数量</span>
            <span class="stat-value">
              <input type="number" class="threshold-input" min="0" step="1" inputmode="numeric" pattern="[0-9]*"
                value="${item.low_stock_threshold}"
                onchange="updateThreshold('${item.id}', this.value)">
            </span>
          </div>
        </div>
        <div class="item-card-footer">
          <div class="qty-control">
            <button class="qty-btn" onclick="adjustQty('${item.id}', ${item.quantity}, -1)"><i data-lucide="minus"></i></button>
            <span class="qty-num">${item.quantity}</span>
            <button class="qty-btn" onclick="adjustQty('${item.id}', ${item.quantity}, 1)"><i data-lucide="plus"></i></button>
          </div>
          <button class="del-btn" onclick="deleteItem('${item.id}')"><i data-lucide="trash-2"></i> 削除</button>
        </div>
      </div>
    `;
  }

  document.getElementById("add-item-btn").addEventListener("click", async () => {
    const name = document.getElementById("item-name").value.trim();
    const category = document.getElementById("item-category").value;
    const unit = document.getElementById("item-unit").value.trim() || "個";
    const quantity = parseFloat(document.getElementById("item-quantity").value) || 0;
    const expiry = document.getElementById("item-expiry").value || null;

    if (!name) {
      showMessage(addMessageBox, "商品名を入力してください", true);
      return;
    }

    const id = await upsertItemByName({
      name, category, unit, quantity, expiry_date: expiry,
      barcode: currentBarcodeValue
    });

    if (!id) {
      showMessage(addMessageBox, "登録に失敗しました。もう一度お試しください。", true);
      return;
    }

    showMessage(addMessageBox, "登録しました(同じ名前の商品があれば数量をまとめました)", false);
    document.getElementById("item-name").value = "";
    document.getElementById("item-unit").value = "個";
    document.getElementById("item-unit-suggestions").innerHTML = "";
    document.getElementById("item-quantity").value = "1";
    document.getElementById("item-expiry").value = "";
    currentBarcodeValue = null;
  });

  window.adjustQty = async function(id, currentQty, delta) {
    const newQty = Math.max(0, Number(currentQty) + delta);
    const { error } = await supabaseClient
      .from("items")
      .update({ quantity: newQty, updated_at: new Date().toISOString() })
      .eq("id", id);
    if (!error) {
      await syncShoppingListForItem(id);
      loadItems();
    } else {
      console.error("数量の更新に失敗:", error);
    }
  };

  window.updateThreshold = async function(id, value) {
    const v = Math.max(0, parseFloat(value) || 0);
    const { error } = await supabaseClient
      .from("items")
      .update({ low_stock_threshold: v, updated_at: new Date().toISOString() })
      .eq("id", id);
    if (!error) {
      await syncShoppingListForItem(id);
    } else {
      console.error("最低数量の更新に失敗:", error);
    }
  };

  window.deleteItem = async function(id) {
    if (!confirm("この項目を削除しますか?")) return;
    const { error } = await supabaseClient.from("items").delete().eq("id", id);
    if (!error) {
      loadItems();
      loadShoppingList();
    }
  };

  async function syncShoppingListForItem(itemId) {
    const { data: item, error: itemError } = await supabaseClient
      .from("items")
      .select("id, name, quantity, low_stock_threshold")
      .eq("id", itemId)
      .single();
    if (itemError || !item) {
      console.error("商品情報の取得に失敗(買い物リスト同期):", itemError);
      return;
    }

    const { data: existingList, error: findError } = await supabaseClient
      .from("shopping_list")
      .select("id")
      .eq("item_id", itemId)
      .eq("is_purchased", false)
      .limit(1);

    if (findError) {
      console.error("買い物リストの検索に失敗:", findError);
      return;
    }
    const existing = existingList && existingList.length > 0 ? existingList[0] : null;

    const isLow = Number(item.quantity) <= Number(item.low_stock_threshold);

    if (isLow && !existing) {
      const { error: insertError } = await supabaseClient.from("shopping_list").insert({
        item_id: item.id,
        name: item.name,
        quantity_needed: 1
      });
      if (insertError) console.error("買い物リストへの追加に失敗:", insertError);
    } else if (!isLow && existing) {
      const { error: deleteError } = await supabaseClient.from("shopping_list").delete().eq("id", existing.id);
      if (deleteError) console.error("買い物リストからの削除に失敗:", deleteError);
    }
  }

  async function loadShoppingList() {
    const { data, error } = await supabaseClient
      .from("shopping_list")
      .select("*")
      .eq("is_purchased", false)
      .order("created_at", { ascending: true });

    if (error) {
      shoppingListEl.innerHTML = '<div class="empty-note">読み込みエラー: ' + error.message + '</div>';
      return;
    }
    renderShoppingList(data);
  }

  function renderShoppingList(rows) {
    if (!rows || rows.length === 0) {
      shoppingListEl.innerHTML = '<div class="empty-note">買い物リストは空です。在庫が少なくなると自動で追加されます。</div>';
      return;
    }

    shoppingListEl.innerHTML = rows.map(row => `
      <div class="shopping-card ${row.item_id ? "" : "manual"}">
        <button class="check-btn" onclick="markPurchased('${row.id}', ${row.item_id ? `'${row.item_id}'` : null}, ${row.quantity_needed})"><i data-lucide="check"></i></button>
        <div class="shopping-info">
          <div class="shopping-name">${escapeHtml(row.name)}</div>
          <div class="shopping-meta">数量 ${row.quantity_needed} ・ ${row.item_id ? "在庫連動" : "自由入力"}</div>
        </div>
        <button class="del-btn" onclick="removeShoppingItem('${row.id}')"><i data-lucide="x"></i></button>
      </div>
    `).join("");

    if (window.lucide) lucide.createIcons();
  }

  document.getElementById("add-shopping-btn").addEventListener("click", async () => {
    const name = document.getElementById("shopping-name").value.trim();
    const quantity = parseFloat(document.getElementById("shopping-quantity").value) || 1;

    if (!name) {
      showMessage(shoppingMessageBox, "商品名を入力してください", true);
      return;
    }

    const { error } = await supabaseClient.from("shopping_list").insert({
      name, quantity_needed: quantity, item_id: null
    });

    if (error) {
      showMessage(shoppingMessageBox, "追加エラー: " + error.message, true);
      return;
    }

    showMessage(shoppingMessageBox, "追加しました", false);
    document.getElementById("shopping-name").value = "";
    document.getElementById("shopping-quantity").value = "1";
    loadShoppingList();
  });

  window.markPurchased = async function(shoppingId, itemId, quantityNeeded) {
    const { error } = await supabaseClient.from("shopping_list").delete().eq("id", shoppingId);
    if (error) {
      console.error("買い物リストの更新に失敗:", error);
      return;
    }

    if (itemId) {
      const { data: item } = await supabaseClient.from("items").select("quantity").eq("id", itemId).single();
      if (item) {
        await supabaseClient
          .from("items")
          .update({ quantity: Number(item.quantity) + Number(quantityNeeded), updated_at: new Date().toISOString() })
          .eq("id", itemId);
      }
    }

    loadShoppingList();
  };

  window.removeShoppingItem = async function(id) {
    if (!confirm("このリストの項目を削除しますか?")) return;
    const { error } = await supabaseClient.from("shopping_list").delete().eq("id", id);
    if (!error) loadShoppingList();
  };

  // ---------- 自作カレンダー(日付選択) ----------

  let calendarTargetInput = null;
  let calendarViewDate = new Date();

  function formatDateYMD(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function openCalendar(targetInput) {
    calendarTargetInput = targetInput;
    const existing = targetInput.value;
    calendarViewDate = existing ? new Date(existing + "T00:00:00") : new Date();
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
    document.getElementById("calendar-overlay").classList.remove("hidden");
  }

  function closeCalendar() {
    document.getElementById("calendar-overlay").classList.add("hidden");
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    calendarTargetInput = null;
  }

  function renderCalendar() {
    const year = calendarViewDate.getFullYear();
    const month = calendarViewDate.getMonth();
    document.getElementById("cal-month-label").textContent = year + "年" + (month + 1) + "月";

    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const selectedValue = calendarTargetInput ? calendarTargetInput.value : "";
    const todayStr = formatDateYMD(new Date());

    const dows = ["日", "月", "火", "水", "木", "金", "土"];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join("");

    for (let i = 0; i < startWeekday; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = formatDateYMD(new Date(year, month, d));
      let cls = "cal-day";
      if (dateStr === selectedValue) cls += " selected";
      if (dateStr === todayStr) cls += " today";
      html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
    }

    document.getElementById("calendar-grid").innerHTML = html;

    document.querySelectorAll("#calendar-grid .cal-day:not(.empty)").forEach(el => {
      el.addEventListener("click", () => {
        if (calendarTargetInput) calendarTargetInput.value = el.dataset.date;
        closeCalendar();
      });
    });
  }

  document.getElementById("cal-prev").addEventListener("click", () => {
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() - 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  });
  document.getElementById("cal-next").addEventListener("click", () => {
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() + 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  });

  const yearSelect = document.getElementById("cal-year-select");
  const monthSelect = document.getElementById("cal-month-select");
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m + "月";
    monthSelect.appendChild(opt);
  }

  document.getElementById("cal-month-label").addEventListener("click", () => {
    const realCurrentYear = new Date().getFullYear();
    const viewYear = calendarViewDate.getFullYear();
    yearSelect.innerHTML = "";
    for (let y = realCurrentYear; y <= realCurrentYear + 10; y++) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y + "年";
      if (y === viewYear) opt.selected = true;
      yearSelect.appendChild(opt);
    }
    monthSelect.value = calendarViewDate.getMonth() + 1;

    document.getElementById("yearmonth-picker").classList.remove("hidden");
    document.getElementById("calendar-grid").classList.add("hidden");
  });

  function applyYearMonthSelection() {
    calendarViewDate = new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  }
  yearSelect.addEventListener("change", applyYearMonthSelection);
  monthSelect.addEventListener("change", applyYearMonthSelection);
  document.getElementById("cal-clear").addEventListener("click", () => {
    if (calendarTargetInput) calendarTargetInput.value = "";
    closeCalendar();
  });
  document.getElementById("cal-close").addEventListener("click", closeCalendar);
  document.getElementById("calendar-overlay").addEventListener("click", (e) => {
    if (e.target.id === "calendar-overlay") closeCalendar();
  });

  document.addEventListener("click", (e) => {
    if (e.target.classList && e.target.classList.contains("date-display")) {
      openCalendar(e.target);
    }
  });

  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
